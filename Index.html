<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Safety Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    flex-direction: column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding: 20px;
}

.top-nav {
    width: 100%;
    max-width: 420px;
    margin-bottom: 15px;
    text-align: left;
}

.back-btn {
    background: #ffffff;
    color: #0056a6;
    padding: 10px 18px;
    border: 1px solid #0056a6;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    transition: all 0.2s ease;
}

.back-btn:hover {
    background: #0056a6;
    color: #fff;
}

.card{
    background:#fff;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:140px;
    height:auto;
    margin-bottom:15px;
}

h1{
    color:#0056a6;
    font-size:24px;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    text-transform: uppercase;
}

button.search-btn {
    width: 100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0056a6;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button.search-btn:hover{
    background:#004080;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var urlParams = new URLSearchParams(window.location.search);
    var empId = urlParams.get('id');

    if (empId) {
        document.getElementById("backContainer").style.display = "block";
        document.getElementById("backContainer").style.maxWidth = "760px";
        document.getElementById("searchCard").style.display = "none";
    }
});

function searchEmployee(){
    var empid = document.getElementById("empid").value.trim().toUpperCase();
    if(empid === ""){
        alert("Please enter Employee Code");
        return;
    }
    // Main Database Script URL
    var scriptUrl = "https://script.google.com/macros/s/AKfycbz8ElMc4zHXKox4d923V2rbh_x6nsRzNEWx2rRCTaU4XfILcScJUfb5bbvRKPVSwZ8HAg/exec?id=";
    window.location.href = scriptUrl + encodeURIComponent(empid);
}

// GitHub Pages par wapas reload karne ka behtar tarika (Bina kisi error ke)
function goBackToPortal() {
    window.location.href = window.location.origin + window.location.pathname;
}
</script>
</head>

<body>

<div class="top-nav" id="backContainer" style="display: none;">
    <button class="back-btn" onclick="goBackToPortal()">← Back to Search Portal</button>
</div>

<div class="card" id="searchCard">
    <img src="https://drive.google.com/thumbnail?id=1wZorZzHUDAtyb860RFnEowOrGNwRP5mR&sz=w300"
         class="logo"
         alt="Company Logo"
         loading="lazy">

    <h1>Employee Search Portal</h1>
    <p class="subtitle">enter employee code to view employee profile</p>

    <input type="text" id="empid" placeholder="Enter Employee Code (e.g. EMP001)" autocomplete="off">
    <button class="search-btn" onclick="searchEmployee()">Search Profile</button>

    <div class="footer">created by emveess safety dept.</div>
</div>

<script>
document.getElementById("empid").addEventListener("keypress", function(e){
    if(e.key === "Enter"){ searchEmployee(); }
});
</script>

</body>
</html>
