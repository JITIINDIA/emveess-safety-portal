<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Safety Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding: 20px;
}

.card{
    background:#fff;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:140px;
    height:auto;
    margin-bottom:15px;
}

h1{
    color:#0056a6;
    font-size:24px;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    text-transform: uppercase;
}

button.search-btn {
    width: 100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0056a6;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button.search-btn:hover{
    background:#004080;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}
</style>
</head>
<body>

<div class="card">
    <img src="https://drive.google.com/thumbnail?id=1wZorZzHUDAtyb860RFnEowOrGNwRP5mR&sz=w300"
         class="logo"
         alt="Company Logo"
         loading="lazy">

    <h1>Employee Search Portal</h1>
    <p class="subtitle">Enter employee code to view employee profile</p>

    <input type="text" id="empid" placeholder="Enter Employee Code (e.g. EMP001)" autocomplete="off">
    <button class="search-btn" onclick="searchEmployee()">Search Profile</button>

    <div class="footer">created by emveess safety dept.</div>
</div>

<script>
function searchEmployee(){
    var empid = document.getElementById("empid").value.trim().toUpperCase();
    
    // Agar kisi ne khali box chhod kar search dabaya toh error page par nahi bhejega
    if(empid === ""){
        alert("Kripya pehle Employee Code dalein!");
        return;
    }
    
    // Aapka wahi fix main URL jiske aage ID lagani h
    var baseUrl = "https://script.google.com/macros/s/AKfycbz8ElMc4zHXKox4d923V2rbh_x6nsRzNEWx2rRCTaU4XfILcScJUfb5bbvRKPVSwZ8HAg/exec";
    
    // Final URL generate hoga jaise: baseUrl + ?id=EMP001
    var finalUrl = baseUrl + "?id=" + encodeURIComponent(empid);
    
    // Profile ko naye tab me open karega taaki aapka ye portal hamesha peeche fast khula rahe
    window.open(finalUrl, '_blank');
    
    // Search karne ke baad box ko wapas khali karne ke liye
    document.getElementById("empid").value = "";
}

// Keyboard se 'Enter' dabane par bhi search chal jaye uske liye
document.getElementById("empid").addEventListener("keypress", function(e){
    if(e.key === "Enter"){ searchEmployee(); }
});
</script>

</body>
</html>
