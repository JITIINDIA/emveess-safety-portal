<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Safety Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:140px;
    height:auto;
    margin-bottom:15px;
}

h1{
    color:#0056a6;
    font-size:24px;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0056a6;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004080;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="card">

    <img src="https://drive.google.com/thumbnail?id=1wZorZzHUDAtyb860RFnEowOrGNwRP5mR"
         class="logo"
         alt="Company Logo">

    <h1>Employee Safety Portal</h1>

    <p class="subtitle">
        Enter Employee ID to View Safety Profile
    </p>

    <input
        type="text"
        id="empid"
        placeholder="Enter Employee ID (EMP001)"
        autocomplete="off">

    <button onclick="searchEmployee()">
        Search Profile
    </button>

    <div class="footer">
        Safety Management System
    </div>

</div>

<script>

function searchEmployee(){

    let empid = document.getElementById("empid")
                  .value
                  .trim()
                  .toUpperCase();

    if(empid === ""){
        alert("Please enter Employee ID");
        return;
    }

    // यहाँ नया URL अपडेट कर दिया गया है
    window.location.href =
    "https://script.google.com/macros/s/AKfycbyvpvj1jd5RqIk89FfOUQX1r7XUsc7ul-5sGlSk9NvjvWtR4V5ZgoBR67wofJS7_ecWMQ/exec?id="
    + encodeURIComponent(empid);
}

document.getElementById("empid").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchEmployee();
    }
});

</script>

</body>
</html>
